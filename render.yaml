services:
  # React Frontend Service
  - type: web
    name: medicare-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_API_URL
        value: https://medicare-backend.onrender.com  # Production backend URL
